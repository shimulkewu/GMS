<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMS – Garment Management System</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">G</div>
    <div>
      <div class="brand-name">GMS</div>
      <div class="brand-sub">Garment System</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-group-label">Operations</div>
    <a href="#" class="nav-item active" data-page="dashboard">
      <span class="nav-icon">▦</span> Dashboard
    </a>
    <a href="#" class="nav-item" data-page="inquiries">
      <span class="nav-icon">✉</span> Buyer Inquiries
    </a>
    <a href="#" class="nav-item" data-page="orders">
      <span class="nav-icon">📋</span> Orders
    </a>
    <a href="#" class="nav-item" data-page="production">
      <span class="nav-icon">⚙</span> Production
    </a>

    <div class="nav-group-label">Inventory</div>
    <a href="#" class="nav-item" data-page="fabric">
      <span class="nav-icon">🧵</span> Fabric & Materials
    </a>
    <a href="#" class="nav-item" data-page="suppliers">
      <span class="nav-icon">🏭</span> Suppliers
    </a>

    <div class="nav-group-label">Quality & Export</div>
    <a href="#" class="nav-item" data-page="qc">
      <span class="nav-icon">✔</span> Quality Control
    </a>
    <a href="#" class="nav-item" data-page="shipment">
      <span class="nav-icon">🚢</span> Shipment
    </a>
    <a href="#" class="nav-item" data-page="documents">
      <span class="nav-icon">📄</span> Documentation
    </a>

    <div class="nav-group-label">Analytics</div>
    <a href="#" class="nav-item" data-page="reports">
      <span class="nav-icon">📊</span> Reports
    </a>
  </nav>

  <div class="sidebar-user">
    <div class="user-avatar">AD</div>
    <div>
      <div class="user-name">Admin User</div>
      <div class="user-role">Manager</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main-wrap">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="page-title" id="pageTitle">Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="search-box">
        <input type="text" placeholder="Search…" id="globalSearch" />
        <span>🔍</span>
      </div>
      <div class="notif-btn" title="Notifications">🔔 <span class="badge">3</span></div>
      <div class="date-badge" id="todayDate"></div>
    </div>
  </header>

  <main class="content" id="content">
    <!-- Pages injected here by JS -->
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle">Form</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
